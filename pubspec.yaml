name: flutter_production_template
description: A production-ready Flutter starter template.
publish_to: "none"

version: 1.0.0+1


environment:
  sdk: ">=3.11.0 <4.0.0"


dependencies:

  flutter:
    sdk: flutter


  # Icons
  cupertino_icons: ^1.0.8


  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1


  # Routing
  go_router: ^15.1.2


  # Networking
  dio: ^5.8.0+1


  # Local Storage
  shared_preferences: ^2.5.3


  # Responsive UI
  flutter_screenutil: ^5.9.3


  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2


  # SVG
  flutter_svg: ^2.1.0


  # Images
  cached_network_image: ^3.4.1


  # Device / Utils
  connectivity_plus: ^6.1.4
  permission_handler: ^12.0.0
  url_launcher: ^6.3.1


  # Environment Variables
  flutter_dotenv: ^5.2.1


  # Logging
  logger: ^2.5.0



dev_dependencies:

  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0


  # Riverpod Generator
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15



  # App Icon Generator
  flutter_launcher_icons: ^0.14.3



  # Splash Generator
  flutter_native_splash: ^2.4.6



flutter:

  uses-material-design: true


  # Assets
  assets:

    # Images
    - assets/images/


    # SVG Icons
    - assets/icons/


    # Localization
    - assets/lang/



  # Fonts example
  fonts:

    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700



# Flutter Launcher Icons Configuration
flutter_launcher_icons:

  android: true
  ios: true

  image_path: assets/images/logo.png

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/logo.png



# Flutter Native Splash Configuration
flutter_native_splash:

  color: "#FFFFFF"

  image: assets/images/logo.png


  android: true
  ios: true


  android_12:

    image: assets/images/logo.png
    color: "#FFFFFF"